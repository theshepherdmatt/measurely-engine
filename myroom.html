    <script>
    document.addEventListener('click', function(event) {
        // Don't override if another handler already called preventDefault (e.g. a modal)
        if (event.defaultPrevented) return;
        var target = event.target;
        // Walk up the DOM tree to find the 'a' tag (in case they clicked an icon inside the link)
        while (target && target.nodeName !== 'A') {
            target = target.parentNode;
        }

        if (target && target.href && target.getAttribute('target') !== '_blank') {
            // Check if the link is internal (points to your Pi's IP)
            if (target.href.indexOf(window.location.host) !== -1) {
                event.preventDefault();
                window.location.href = target.href;
            }
        }
    }, false);
    </script>

<script type="module">
import { initRoom3D } from "./js/room3d.js";
import { attachHighlightListeners, UIController, setNestedRoomValue, getNestedRoomValue } from './js/uiController.js';
import { UIFactory } from './js/UIFactory.js';

function isStaticHosting() {
  const h = window.location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') return false;
  if (/^192\.168\./.test(h) || /^10\./.test(h)) return false;
  if (h.endsWith('.local')) return false;
  return true;
}

async function loadSavedRoom() {
  try {
    let saved = null;

    // 1. Try localStorage first (works offline / GitHub Pages)
    try {
      const ls = localStorage.getItem('measurely_room');
      if (ls) saved = JSON.parse(ls);
    } catch (_) {}

    // 2. Try PocketBase cloud when the user is signed in — cloud wins if newer
    try {
      const cloud = await window.MeasurelySync?.pullRoom();
      if (cloud) saved = cloud;
    } catch (_) {
      console.log("[Room] Cloud pull failed — using localStorage");
    }

    if (!saved) return;

    // Apply saved data over the defaults
    roomState = structuredClone(DEFAULT_ROOM_STATE);

    if (saved.geometry) {
      roomState.geometry = { ...roomState.geometry, ...saved.geometry };
      // Coerce numeric strings that may have slipped in
      ['length_m','width_m','height_m','ceiling_height_secondary_m'].forEach(k => {
        if (roomState.geometry[k] != null) roomState.geometry[k] = parseFloat(roomState.geometry[k]);
      });
    }

    if (saved.setup) {
      roomState.setup = { ...roomState.setup, ...saved.setup };
      Object.keys(roomState.setup).forEach(k => {
        const v = roomState.setup[k];
        if (typeof v === 'string' && !isNaN(v)) roomState.setup[k] = parseFloat(v);
      });
    }

    if (saved.environment) {
      roomState.environment = {
        ...roomState.environment,
        ...saved.environment,
        furniture: {
          ...roomState.environment.furniture,
          ...(saved.environment.furniture || {})
        },
        treatment: {
          ...roomState.environment.treatment,
          ...(saved.environment.treatment || {})
        }
      };
    }

    if (saved.room_type) roomState.room_type = saved.room_type;

    // Also surface flat compat keys so getNestedRoomValue finds them on the
    // first pass even before UIController remaps them to the nested paths.
    roomState.length_m  = roomState.geometry.length_m;
    roomState.width_m   = roomState.geometry.width_m;
    roomState.height_m  = roomState.geometry.height_m;

    console.log("[Room] Loaded saved room:", roomState);

  } catch (e) {
    console.warn("[Room] loadSavedRoom failed:", e);
  }
}


/* ------------------------------------------
    LOCAL ROOM STATE (single source of truth)
------------------------------------------ */
const DEFAULT_ROOM_STATE = {
  geometry: {
    length_m: 4,
    width_m: 4,
    height_m: 2.5,
    ceiling_type: "flat",
    ceiling_slant_direction: "left_to_right",
    ceiling_gable_axis: "depth",
    ceiling_height_secondary_m: 2.0
  },
  setup: {
    speaker_type: "standmount",
    spk_spacing_m: 2,
    spk_front_m: 0.3,
    tweeter_height_m: 1.3,
    toe_in_deg: 15,
    listener_front_m: 2.5,
    listener_offset_m: 0,
    subwoofer: false
  },
  environment: {
    room_type: "home",
    floor_material: "hard",
    furniture: {
      opt_area_rug: true,
      opt_sofa: true,
      opt_coffee_table: false,
      opt_desk: false,
      opt_chair: false
    },
    treatment: {
      wall_panel_mode: "none",
      side_panel_mode: "none",
      bass_trap_mode: "none",
      ceiling_panel_mode: "none"
    }
  },
  // Keep memory for the toggle logic in uiController
  home_memory: { /* ... same as before ... */ },
  studio_memory: { /* ... same as before ... */ }
};

let isRefreshingUI = false;

let roomState = structuredClone(DEFAULT_ROOM_STATE);

/* ------------------------------------------
   INIT 3D ROOM
   NOTE: room3D is initialised before loadSavedRoom() because the canvas
   must exist before we call update(). getRoomData always reads the live
   roomState reference, so calling room3D.update() after load refreshes
   the scene with the persisted data.
------------------------------------------ */
// ── Treatment view toggle ─────────────────────────────────────────────────────
let _treatmentViewMode = 'current'; // 'current' | 'treated'
let _treatmentPlan = null;          // saved Fix My Room plan (from PocketBase)

const _NO_TREATMENT = { wall_panel_mode: 'none', side_panel_mode: 'none', bass_trap_mode: 'none', ceiling_panel_mode: 'none' };

// Build the "treated" room state from the saved plan, or fall back to roomState's own treatment
function _buildTreatedState() {
  if (!_treatmentPlan) return roomState; // no plan — show current configured treatment

  const layout   = _treatmentPlan.layout_config   || {};
  const shopping = _treatmentPlan.shopping_list    || [];
  const ids      = new Set(shopping.map(t => t.id));

  return {
    ...roomState,
    setup: {
      ...roomState.setup,
      subwoofer: ids.has('subwoofer') ? true : roomState.setup?.subwoofer
    },
    environment: {
      ...roomState.environment,
      furniture: {
        ...roomState.environment.furniture,
        opt_area_rug: ids.has('rug')   ? true : roomState.environment.furniture?.opt_area_rug,
        opt_sofa:     ids.has('sofa')  ? true : roomState.environment.furniture?.opt_sofa,
      },
      treatment: {
        wall_panel_mode:    layout.wall_panel_mode    ?? 'none',
        side_panel_mode:    layout.side_panel_mode    ?? 'none',
        bass_trap_mode:     layout.bass_trap_mode     ?? 'none',
        ceiling_panel_mode: layout.ceiling_panel_mode ?? 'none',
      }
    }
  };
}

function _getRoomDataForView() {
  if (_treatmentViewMode === 'current') {
    return {
      ...roomState,
      environment: { ...roomState.environment, treatment: { ..._NO_TREATMENT } }
    };
  }
  return _buildTreatedState();
}

// Load the saved Fix My Room plan and refresh the 3D view if in treated mode
async function _loadTreatmentPlan() {
  try {
    const plan = await window.MeasurelySync?.pullTreatment();
    if (plan) {
      _treatmentPlan = plan;
      const btn = document.getElementById('ttTreated');
      if (btn) btn.textContent = 'Treated room ✦';
      // Rebuild regardless of current view so the plan is ready when toggled
      if (room3D?.update) room3D.update();
    }
  } catch (_) {}
}

document.getElementById('treatmentToggle')?.addEventListener('click', (e) => {
  const btn = e.target.closest('.tt-btn');
  if (!btn) return;
  const view = btn.dataset.view;
  if (view === _treatmentViewMode) return;
  _treatmentViewMode = view;
  document.querySelectorAll('#treatmentToggle .tt-btn').forEach(b => b.classList.toggle('tt-active', b.dataset.view === view));
  if (room3D?.update) room3D.update();
  if (typeof updateTargetBar === 'function') updateTargetBar(view);
});

const room3D = initRoom3D({
  mountId: "roomCanvas",
  getRoomData: () => _getRoomDataForView(),
  mode: "setup",
  onSpeakerDrag({ spk_spacing_m, spk_front_m }) {
    if (typeof _markDirty === 'function') _markDirty();
    roomState.setup.spk_spacing_m = spk_spacing_m;
    roomState.setup.spk_front_m   = spk_front_m;
    roomState.spk_spacing_m       = spk_spacing_m;
    roomState.spk_front_m         = spk_front_m;
    // Sync sliders if they're visible
    const syncSlider = (key, val) => {
      const el = document.querySelector(`[data-key="${key}"]`);
      if (!el) return;
      el.value = val;
      import('./js/uiController.js').then(({ updateSliderFill }) => updateSliderFill(el));
    };
    syncSlider('spk_spacing_m', spk_spacing_m);
    syncSlider('spk_front_m',   spk_front_m);
  },
  onListenerDrag({ listener_front_m, listener_offset_m }) {
    if (typeof _markDirty === 'function') _markDirty();
    roomState.setup.listener_front_m   = listener_front_m;
    roomState.setup.listener_offset_m  = listener_offset_m;
    roomState.listener_front_m         = listener_front_m;
    roomState.listener_offset_m        = listener_offset_m;
    const syncSlider = (key, val) => {
      const el = document.querySelector(`[data-key="${key}"]`);
      if (!el) return;
      el.value = val;
      import('./js/uiController.js').then(({ updateSliderFill }) => updateSliderFill(el));
    };
    syncSlider('listener_front_m',  listener_front_m);
    syncSlider('listener_offset_m', listener_offset_m);
  }
});

/* ------------------------------------------
   ONBOARDING STEPS
------------------------------------------ */
const steps = [
  /* ------------------------------------------
      STEP 0 — ENVIRONMENT (New Independent Step)
  ------------------------------------------ */
{
    type: "environment",
    title: "Environment",
    fields: [
      { 
        key: "room_type", 
        kind: "select", 
        label: "Room Mode", 
        sub: "Switches between living room and studio furniture",
        options: [
          { value: "home", label: "Home / Hi-Fi" },
          { value: "studio", label: "Studio / Desk" }
        ]
      }
    ]
  },

  /* ------------------------------------------
      STEP 1 — ROOM
  ------------------------------------------ */
  {
    type: "room",
    title: "Room dimensions",
    fields: [
      {
        key: "length_m",
        label: "Room length",
        sub: "Front wall to back wall",
        min: 2,
        max: 10,
        step: 0.05
      },
      {
        key: "width_m",
        label: "Room width",
        sub: "Left wall to right wall",
        min: 2,
        max: 10,
        step: 0.05
      },
      {
        key: "height_m",
        label: "Ceiling height",
        sub: "Floor to ceiling (high side if slanted)",
        min: 2,
        max: 3.5,
        step: 0.01
      },
      {
        key: "ceiling_type",
        kind: "select",
        label: "Ceiling shape",
        sub: "Flat or slanted (pent) roof",
        options: [
          { value: "flat", label: "Flat" },
          { value: "slanted", label: "Slanted (pent roof)" },
          { value: "gable", label: "Gabled (pitched roof)" }
        ]
      },
      {
        key: "ceiling_slant_direction",
        kind: "select",
        label: "Slant direction",

function _applyRoomData(saved) {
  if (!saved) return;
  roomState = structuredClone(DEFAULT_ROOM_STATE);
  if (saved.geometry) {
    roomState.geometry = { ...roomState.geometry, ...saved.geometry };
    ['length_m','width_m','height_m','ceiling_height_secondary_m'].forEach(k => {
      if (roomState.geometry[k] != null) roomState.geometry[k] = parseFloat(roomState.geometry[k]);
    });
  }
  if (saved.setup) {
    roomState.setup = { ...roomState.setup, ...saved.setup };
    Object.keys(roomState.setup).forEach(k => {
      const v = roomState.setup[k];
      if (typeof v === 'string' && !isNaN(v)) roomState.setup[k] = parseFloat(v);
    });
  }
  if (saved.environment) {
    roomState.environment = {
      ...roomState.environment,
      ...saved.environment,
      furniture: { ...roomState.environment.furniture, ...(saved.environment.furniture || {}) },
      treatment: { ...roomState.environment.treatment, ...(saved.environment.treatment || {}) },
    };
  }
  if (saved.room_type) roomState.room_type = saved.room_type;
  roomState.length_m = roomState.geometry.length_m;
  roomState.width_m  = roomState.geometry.width_m;
  roomState.height_m = roomState.geometry.height_m;
  window.__MEASURELY_ROOM__ = roomState;
  if (room3D?.update) room3D.update();
}

// Simple debounce helper to prevent console spam when sliding rapidly
function debounce(func, wait) {
    let timeout;
    return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), wait);
    };
}
const debouncedUpdate = debounce(() => {
    if (room3D && room3D.update) room3D.update();
}, 25);

function renderAllSections() {
    // 1. Clear the stack to prevent duplicate UI elements
    fieldStack.innerHTML = "";

    steps.forEach(section => {
        // 2. Create Section Header
        const sectionHeader = document.createElement("h3");
        sectionHeader.className = "room-section-title";
        sectionHeader.textContent = section.title;
        fieldStack.appendChild(sectionHeader);

        const fieldsHtml = section.fields.map(f => {
            const factoryConfig = {
                ...f,
                type: f.kind || 'slider',
                displayFormat: { suffix: f.key.includes("deg") ? "°" : (f.kind !== 'select' && f.kind !== 'toggle' ? "m" : "") }
            };

            const val = getNestedRoomValue(roomState, f.key);
            let htmlContext = UIFactory.renderField(factoryConfig, val);

            let displayStyle = "";
            if (f.showIf) {
                const depVal = getNestedRoomValue(roomState, f.showIf.key);
                const allowed = Array.isArray(f.showIf.value) ? f.showIf.value : [f.showIf.value];
                if (!allowed.includes(depVal)) {
                    displayStyle = ' style="display: none;"';
                }
            }
            
            htmlContext = htmlContext.replace('<div class="field', `<div id="field-${f.key}"${displayStyle} class="field`);

            if (f.key === "toe_in_deg") {
                const calcLinkHtml = `<span class="calc-link" onclick="if(window.openToeModal) window.openToeModal();">Calculate from wall</span>`;
                htmlContext = htmlContext.substring(0, htmlContext.lastIndexOf('</div>')) + "\n" + calcLinkHtml + "\n</div>";
            }

            return htmlContext;
        }).join('');

        fieldStack.insertAdjacentHTML('beforeend', fieldsHtml);
    }); 

    UIController.attach({
        container: fieldStack,
        state: roomState,
        room3D: room3D,
        onValueUpdate: (key, val) => {
            // Forward room-dimension changes to the live 3D API so the room
            // resizes immediately without waiting for a data-store round-trip.
            if (key === 'width_m'  && room3D?.setRoomWidth)  room3D.setRoomWidth(val);
            if (key === 'length_m' && room3D?.setRoomLength) room3D.setRoomLength(val);
        },
        onMacroChange: () => {
            renderAllSections();
        }
    });
}

window.applyToeCalc = function() {
  const w = parseFloat(document.getElementById('calc_spk_w').value);
  const dInner = parseFloat(document.getElementById('calc_dist_inner').value);
  const dOuter = parseFloat(document.getElementById('calc_dist_outer').value);

  // Validation: Ensure we have numbers to work with
  if (isNaN(w) || isNaN(dInner) || isNaN(dOuter) || w === 0) {
    alert("Please enter valid measurements for the speaker depth and wall distances.");
    return;
  }

  // 1. Calculate Measured Angle (using Sine for the triangle formed by speaker depth)
  const diff = Math.abs(dOuter - dInner);
  // Ensure the ratio doesn't exceed 1 (math error) due to measurement typos
  const ratio = Math.min(diff / w, 1);
  let measuredAngle = Math.asin(ratio) * (180 / Math.PI);
  
  // 2. Calculate Ideal Angle (Direct to ear using Tangent)
  const halfSpacing = roomState.spk_spacing_m / 2;
  const distToListener = roomState.listener_front_m;
  let idealAngle = Math.atan(halfSpacing / distToListener) * (180 / Math.PI);

  // 3. Update Results Display
  const resDiv = document.getElementById('calc_results');
  if (resDiv) {
    resDiv.style.display = 'block';
    resDiv.style.marginTop = '1rem';
    resDiv.style.padding = '10px';
    resDiv.style.background = 'rgba(16, 185, 129, 0.1)';
    resDiv.style.borderRadius = '6px';
    resDiv.style.border = '1px solid rgba(16, 185, 129, 0.3)';
    
    resDiv.innerHTML = `
      <div style="color: #10b981; font-weight: bold;">Calculation Successful</div>
      <div style="color: #94a3b8; font-size: 0.85rem;">
        Measured Toe-in: <strong>${Math.round(measuredAngle)}°</strong><br>
        Ideal for Position: <strong>${Math.round(idealAngle)}°</strong>
      </div>
    `;
  }

  // 4. Update state and UI
  // Note: We round the angle for the slider. 
  roomState.toe_in_deg = Math.round(measuredAngle);
  
  // Re-sync the 3D view and the main panel
  if (room3D && room3D.update) room3D.update();
  renderAllSections();

  // Close modal after a brief delay so they can see the result
  setTimeout(window.closeToeModal, 1200);
};

// ── Dirty-state tracking ─────────────────────────────────────────────────────
// Marked true whenever the user changes anything; cleared after a successful save.
let _roomDirty = false;

function _markDirty() {
  if (!_roomDirty) {
    _roomDirty = true;
    saveBtn.textContent = 'Save *';
  }
}

function _markClean() {
  _roomDirty = false;
  saveBtn.textContent = 'Save';
}

// Patch UIController so any field change marks the room dirty.
// The UIController fires 'mly:roomchange' events or we can wrap the update path.
// Simplest reliable hook: observe any input/change event inside the panel.
document.getElementById('questionPanel')?.addEventListener('input',  _markDirty, { passive: true });
document.getElementById('questionPanel')?.addEventListener('change', _markDirty, { passive: true });

// DragControls callbacks also mutate state — mark dirty after speaker/listener drags.
// We patch the finish block to call _markClean; onSpeakerDrag / onListenerDrag call _markDirty.
const _origFinish = finish;
finish = async function () {
  _markClean();
  await _origFinish();
};

// beforeunload — standard browser dialog when closing/refreshing with unsaved work
window.addEventListener('beforeunload', (e) => {
  if (_roomDirty) {
    e.preventDefault();
    e.returnValue = ''; // Chrome requires returnValue to be set
  }
});

saveBtn.onclick = () => finish();

const flybyBtn = document.getElementById('flybyBtn');
if (flybyBtn) {
  flybyBtn.onclick = () => {
    if (!room3D?.flyby) return;
    document.body.classList.add('flyby-active');
    flybyBtn.disabled = true;
    room3D.flyby(() => {

      room3D.resetCamera?.();

}

resetBtn.onclick = () => {
  if (!confirm("Reset all room settings to factory defaults? Your saved setup will be cleared.")) return;
  roomState = structuredClone(DEFAULT_ROOM_STATE);
  // Clear persisted data
  try { localStorage.removeItem('measurely_room'); } catch (_) {}
  if (room3D?.update) room3D.update();
  renderAllSections();
  _markClean();
};

function _navigate(href) {
  if (document.startViewTransition) {
    document.startViewTransition(() => { window.location.href = href; });
  } else {
    window.location.href = href;
  }
}

backBtn.onclick = () => {
  if (_roomDirty) {
    if (!confirm('You have unsaved changes. Leave without saving?')) return;
  }
  _navigate('app.html');
};

<script>
// ── Simulated target bar — reactive to Current/Treated toggle ──
const SCORE_METRICS = [
    { key: 'peaks_dips',  label: 'Peaks'  },
    { key: 'reflections', label: 'Refl'   },
    { key: 'bandwidth',   label: 'BW'     },
    { key: 'balance',     label: 'Bal'    },
    { key: 'smoothness',  label: 'Smooth' },
    { key: 'clarity',     label: 'Clarity'},
];

function _scoreQuality(val) {
    if (val == null) return '';
    return val < 5 ? 'poor' : val < 7.5 ? 'ok' : 'good';
}

function _readScores(key) {
    try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch (_) { return null; }
}

function updateTargetBar(view) {
    const badge     = document.getElementById('simTargetBadge');
    const chips     = document.getElementById('stbChips');
    const overallEl = document.getElementById('stbOverall');
    const label     = document.getElementById('stbLabel');
    if (!badge || !chips || !overallEl) return;

    // Current view: baseline scores. Treated view: predicted scores after treatment.
    const scores = view === 'treated'
        ? (_readScores('measurely_treated_scores') || _readScores('measurely_sim_targets'))
        : (_readScores('measurely_base_scores')    || _readScores('measurely_sim_targets'));

    if (!scores) return;

    const vals = SCORE_METRICS.map(m => scores[m.key]).filter(v => typeof v === 'number');
    const overall = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;

    if (overall != null) {
        overallEl.textContent = overall.toFixed(1);
        overallEl.className   = 'stb-overall-num ' + _scoreQuality(overall);
    }

    chips.innerHTML = SCORE_METRICS.map(({ key, label }) => {
        const val = scores[key] ?? null;
        const num = val != null ? Number(val).toFixed(1) : '—';
        return `<span class="stb-chip ${_scoreQuality(val)}">${label} <strong>${num}</strong></span>`;
    }).join('');

    if (label) label.textContent = view === 'treated' ? 'TREATED TARGET' : 'SIMULATED TARGET';
    badge.hidden = false;
}

// Initial render on page load
updateTargetBar('current');
</script>

<script>
// ── Treatment plan post-install flow ──────────────────────────
(function () {
    const PLAN_LABELS = {
        plan_wall_panels:    { front: 'Front wall panels', rear: 'Rear wall panels', both: 'Front + rear panels' },
        plan_bass_traps:     { front: 'Front bass traps',  rear: 'Rear bass traps',  all:  'All corner bass traps' },
        plan_side_panels:    { left:  'Left side panel',   right:'Right side panel', both: 'Side wall panels' },
        plan_ceiling_panels: { cloud: 'Ceiling cloud' }
    };

    // Map plan fields to actual treatment fields
    const PLAN_TO_TREATMENT = {
        plan_wall_panels:    'wall_panel_mode',
        plan_bass_traps:     'bass_trap_mode',
        plan_side_panels:    'side_panel_mode',
        plan_ceiling_panels: 'ceiling_panel_mode'
    };

    let room;
    try { room = JSON.parse(localStorage.getItem('measurely_room') || 'null'); } catch (_) {}
    if (!room) return;

    const items = [];
    for (const [field, map] of Object.entries(PLAN_LABELS)) {
        const val = room[field];
        if (val && val !== 'none' && map[val]) items.push({ field, val, label: map[val] });
    }
    if (items.length === 0) return;

    const badge    = document.getElementById('planInstallBadge');
    const itemsEl  = document.getElementById('planInstallItems');
    const installBtn = document.getElementById('planInstallBtn');
    const dismissBtn = document.getElementById('planInstallDismiss');
    if (!badge || !itemsEl) return;

    itemsEl.innerHTML = items.map(({ label }) =>
        `<div style="font-size:0.78rem;color:rgba(226,232,240,0.8);padding:0.12rem 0;display:flex;align-items:center;gap:0.4rem;">
            <span style="color:#a5b4fc;font-size:0.65rem;">✦</span>${label}
        </div>`
    ).join('');

    badge.hidden = false;

    dismissBtn?.addEventListener('click', () => { badge.hidden = true; });

    installBtn?.addEventListener('click', () => {
        // Apply plan values to actual treatment fields and clear the plan
        try {
            const saved = JSON.parse(localStorage.getItem('measurely_room') || '{}');
            const env = saved.environment ?? {};
            const treatment = env.treatment ?? {};

            for (const [planField, treatField] of Object.entries(PLAN_TO_TREATMENT)) {
                const v = saved[planField];
                if (v && v !== 'none') treatment[treatField] = v;
                delete saved[planField];
            }

            saved.environment = { ...env, treatment };
            localStorage.setItem('measurely_room', JSON.stringify(saved));
        } catch (_) {}

        badge.hidden = true;
        // Navigate to dashboard
        if (document.startViewTransition) {
            document.startViewTransition(() => { window.location.href = 'app.html'; });
        } else {
            window.location.href = 'app.html';
        }
    });
})();
</script>
