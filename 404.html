<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Measurely</title>
  <script>
    /**
     * GitHub Pages SPA redirect — rafgraph/spa-github-pages pattern.
     *
     * When GitHub Pages serves a 404 for a deep path like /dashboard or
     * /session/upload_123, this page encodes the original URL as:
     *   /?p=<encoded-path><encoded-search><hash>
     * and redirects to index.html, which decodes ?p= and restores the path
     * via history.replaceState (see the inline script at the bottom of index.html).
     *
     * Handles:
     *   - Simple paths:          /dashboard → /?p=dashboard
     *   - Paths with search:     /dashboard?foo=bar → /?p=dashboard%3Ffoo%3Dbar
     *   - Repo sub-path deploys: /measurely/dashboard → /measurely/?p=dashboard
     */
    (function () {
      var l = window.location;

      // Detect the repo root: if the GitHub Pages site is at /repo-name/,
      // l.pathname.split('/')[1] gives 'repo-name'. Preserve it as the base.
      var pathParts = l.pathname.split('/');
      var repoSegment = pathParts.length > 1 ? '/' + pathParts[1] : '';

      // The deep path starts after the repo segment (or from the root)
      var deepPath = pathParts.slice(2).join('/');   // everything after /repo/

      // If deploying at root (e.g. username.github.io), deepPath = pathname minus leading /
      if (!deepPath && pathParts.length <= 2) {
        deepPath = pathParts.slice(1).join('/');
        repoSegment = '';
      }

      var target =
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        repoSegment + '/' +                           // repo root or '/'
        '?p=' + encodeURIComponent(deepPath + (l.search ? l.search : '')) +
        (l.hash ? l.hash : '');

      l.replace(target);
    }());
  </script>
</head>
<body></body>
</html>
