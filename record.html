<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Measurely Engine — Record Tool</title>
<!--
  record.html — the engine repo's only HTML file.

  The engine was deliberately stripped to JS-only in commit 33f4a51
  ("strip repo to engine-only"). This tool re-introduces a single
  HTML file for capturing short WebM clips of the 3D room for the
  measurely.uk marketing site. It is tools-only, not part of the
  engine's library surface, and is not deployed anywhere — open it
  directly in Chrome (file:// or a static server pointed at the
  engine repo root).

  Captures are configurable:
    - Mode:       Home / Studio (studio swaps to monitor speakers + desk)
    - Desk:       Plain / Production (studio only — the desk_style flag)
    - Treatments: wall / side / bass-trap / ceiling panel modes
    - Overlay:    None (clean scene) / SBIR / Bass Modes / Reflections
    - Auto-spin:  slow orbit, good for showing a desk from angles

  Boot pattern mirrors measurely-web/demo.html — same importmap for
  the Three.js ESM bridge, same classic-script order for the analysis
  pipeline, same ES-module import of room3d.js. The engine API is
  reached via window.room3D, which initRoom3D() sets internally.

  Output: video/webm;codecs=vp9 at 8 Mbps from a 1200×800 mount.
  Re-encode to mp4 separately with ffmpeg if required for delivery, e.g.
    ffmpeg -i scene-xxx.webm -c:v libx264 -pix_fmt yuv420p -crf 18 scene-xxx.mp4
-->
<style>
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #recordCanvas {
    width: 1200px;
    height: 800px;
    flex-shrink: 0;
    background: #F7F7F7;
    position: relative;
  }

  #recordCanvas.recording {
    pointer-events: none;
    outline: 2px solid #ff5050;
    outline-offset: 4px;
  }

  #controls {
    position: fixed;
    top: 16px;
    left: 16px;
    width: 240px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    background: rgba(20, 20, 20, 0.94);
    border: 1px solid #333;
    border-radius: 6px;
    padding: 14px 16px;
    z-index: 10;
    font-size: 13px;
  }

  #controls h1 {
    margin: 0 0 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
  }

  fieldset {
    border: 1px solid #2e2e2e;
    border-radius: 4px;
    padding: 8px 10px 10px;
    margin: 0 0 12px;
  }

  legend {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    padding: 0 4px;
  }

  fieldset label {
    display: block;
    padding: 3px 0;
    cursor: pointer;
    line-height: 1.4;
  }

  fieldset input[type="radio"],
  fieldset input[type="checkbox"] {
    margin-right: 6px;
    vertical-align: middle;
  }

  fieldset label.sel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  fieldset select {
    flex: 1 1 auto;
    max-width: 120px;
    background: #2a2a2a;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 3px;
    padding: 3px 4px;
    font-family: inherit;
    font-size: 12px;
  }

  button {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: #2a2a2a;
    color: #e0e0e0;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.01em;
  }

  button:hover:not(:disabled) {
    background: #333;
    border-color: #555;
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #status {
    margin: 12px 0 0;
    padding: 8px 0 0;
    border-top: 1px solid #2a2a2a;
    font-size: 12px;
    color: #aaa;
    min-height: 16px;
    line-height: 1.4;
  }

  #status.error     { color: #ff6868; }
  #status.recording { color: #ff5050; }
  #status.ready     { color: #7adba6; }
</style>

<!-- Three.js ESM bridge — mirrors demo.html's importmap. The classic
     three.min.js below populates globalThis.THREE; three.module.js
     re-exports it for the room3d.js ES module. -->
<script type="importmap">
{
  "imports": {
    "three": "./js/vendor/three/three.module.js"
  }
}
</script>

<!-- Classic-script load order mirrors measurely-web/demo.html. The
     analysis-pipeline scripts set window.MeasurelyXxx globals that
     room3d.js reads via optional chaining; imageSource is added for
     the side_reflections (Reflections) overlay. -->
<script src="js/vendor/three/three.min.js" defer></script>
<script src="js/vendor/three/OrbitControls.js" defer></script>
<script src="js/engine/fft.js"></script>
<script src="js/engine/signal_math.js"></script>
<script src="js/engine/score.js"></script>
<script src="js/engine/acoustics.js"></script>
<script src="js/engine/analyse.js"></script>
<script src="js/engine/fileLoader.js"></script>
<script src="js/engine/imageSource.js"></script>
<script src="js/treatment-registry.js"></script>
</head>
<body>

<div id="recordCanvas"></div>

<aside id="controls">
  <h1>Record Tool</h1>

  <fieldset id="modeFieldset">
    <legend>Mode</legend>
    <label><input type="radio" name="mode" value="home" checked> Home</label>
    <label><input type="radio" name="mode" value="studio"> Studio</label>
  </fieldset>

  <fieldset id="deskFieldset">
    <legend>Desk (studio)</legend>
    <label><input type="radio" name="desk" value="plain" checked> Plain</label>
    <label><input type="radio" name="desk" value="production"> Production</label>
  </fieldset>

  <fieldset id="treatFieldset">
    <legend>Treatments</legend>
    <label class="sel">Wall
      <select name="wall_panel_mode">
        <option value="none">none</option>
        <option value="front">front</option>
        <option value="rear">rear</option>
        <option value="both">both</option>
      </select>
    </label>
    <label class="sel">Side
      <select name="side_panel_mode">
        <option value="none">none</option>
        <option value="left">left</option>
        <option value="right">right</option>
        <option value="both">both</option>
      </select>
    </label>
    <label class="sel">Bass traps
      <select name="bass_trap_mode">
        <option value="none">none</option>
        <option value="front">front</option>
        <option value="rear">rear</option>
        <option value="all">all</option>
      </select>
    </label>
    <label class="sel">Ceiling
      <select name="ceiling_panel_mode">
        <option value="none">none</option>
        <option value="cloud">cloud</option>
        <option value="flush">flush</option>
      </select>
    </label>
  </fieldset>

  <fieldset id="overlayFieldset">
    <legend>Overlay</legend>
    <label><input type="radio" name="overlay" value="none" checked> None (clean scene)</label>
    <label><input type="radio" name="overlay" value="sbir"> SBIR</label>
    <label><input type="radio" name="overlay" value="bandwidth"> Bass Modes</label>
    <label><input type="radio" name="overlay" value="side_reflections"> Reflections</label>
  </fieldset>

  <fieldset id="camFieldset">
    <legend>Camera</legend>
    <label><input type="checkbox" name="spin"> Auto-spin</label>
  </fieldset>

  <button id="setupBtn">Setup scene</button>
  <button id="recordBtn" disabled>Record 6s</button>
  <button id="downloadBtn" disabled>Download .webm</button>

  <p id="status">Idle</p>
</aside>

<script type="module">
import { initRoom3D } from './js/room3d.js';

// ─────────────────────────────────────────────────────────────────────
//  Per-mode geometry + setup. Home mirrors the original recorder; Studio
//  mirrors the SCL studio room-type preset (monitor speakers on a desk,
//  smaller near-field room). The engine overrides spk_spacing_m /
//  listener_front_m in studio from the desk width + chair geometry, so the
//  studio spacing value here is only a fallback.
// ─────────────────────────────────────────────────────────────────────
const HOME_GEO   = { width_m: 4.0, length_m: 5.0, height_m: 2.5, ceiling_type: 'flat' };
const STUDIO_GEO = { width_m: 3.2, length_m: 3.8, height_m: 2.4, ceiling_type: 'flat' };

const HOME_SETUP = {
  speaker_type: 'floorstander', spk_placement: 'stands',
  spk_spacing_m: 2.2, spk_front_m: 0.4, tweeter_height_m: 0.95,
  toe_in_deg: 12, listener_front_m: 3.0, listener_offset_m: 0,
  subwoofer: 'none', subwoofer_dual: false,
};
const STUDIO_SETUP = {
  speaker_type: 'monitor', spk_placement: 'desk',
  spk_spacing_m: 1.8, spk_front_m: 0.6, spk_inset_m: 0.20, tweeter_height_m: 1.1,
  toe_in_deg: 15, listener_front_m: 1.4, listener_offset_m: 0,
  subwoofer: 'none', subwoofer_dual: false,
};

// Synthetic measurement context for the Bass Modes overlay — drives the
// volumetric pressure field to render confirmed (coloured) modes instead of
// muted-grey predicted-only markers. Engine reads .modes[].{type, freq_hz,
// delta_db} per the setMeasurementContext shape in room3d.js.
const BASS_MODES_CONTEXT = {
  modes: [
    { type: 'axial', freq_hz:  35, delta_db:  8 },
    { type: 'axial', freq_hz:  67, delta_db:  6 },
    { type: 'axial', freq_hz: 110, delta_db: 10 },
    { type: 'axial', freq_hz: 165, delta_db:  4 },
  ],
};

const OVERLAY_LABELS = {
  none:             'Clean scene',
  sbir:             'SBIR',
  bandwidth:        'Bass Modes',
  side_reflections: 'Reflections',
};

// ─────────────────────────────────────────────────────────────────────
//  Base room state — engine reads this via getRoomData. applyConfig()
//  mutates it from the control panel before each Setup.
// ─────────────────────────────────────────────────────────────────────
const BASE_STATE = {
  room_type: 'home',
  geometry: { ...HOME_GEO },
  setup:    { ...HOME_SETUP },
  environment: {
    floor_material: 'hard',
    furniture: {
      opt_sofa:           true,
      opt_area_rug:       false,
      opt_coffee_table:   false,
      opt_ottoman:        false,
      opt_display:        false,
      opt_mic:            false,
      opt_keyboard:       false,
      opt_client_seating: false,
      client_seating_type: 'sofa',
      seating_type:        'sofa',
      sofa_width_m:        2.0,
      desk_width_m:        1.6,
      desk_depth_m:        0.7,
      desk_style:          'plain',
    },
    treatment: {
      wall_panel_mode:    'none',
      side_panel_mode:    'none',
      bass_trap_mode:     'none',
      ceiling_panel_mode: 'none',
    },
  },
};

const recordState = structuredClone(BASE_STATE);

// ─────────────────────────────────────────────────────────────────────
//  Engine init. The 1200×800 mount is sized by CSS before the parser
//  reaches this script, so initRoom3D's camera aspect-ratio math and
//  renderer.setSize call bake in the correct 1.5 aspect ratio. mode
//  is 'analysis' (not 'setup') so the speakers render as fixed meshes
//  without the draggable handles the setup wizard uses.
// ─────────────────────────────────────────────────────────────────────
const engine = initRoom3D({
  mountId:     'recordCanvas',
  getRoomData: () => recordState,
  mode:        'analysis',
});
window.room3D = engine;

// Override the engine-default studio-grey clear colour so the captured
// canvas pixels ship on their final marketing background. captureStream
// reads WebGL pixels, not the parent div's CSS background, so this must
// be set on the renderer itself.
engine.getRenderer().setClearColor(0xF7F7F7, 1);

engine.setStage('furnishings');
// Waves off — the expanding ring simulation layered busy concentric circles
// on top of every scene. Overlay-specific shaders are gated independently by
// focusIssue(), so disabling waves only kills the rings.
engine.setWaves(false);

// ─────────────────────────────────────────────────────────────────────
//  DOM refs + state
// ─────────────────────────────────────────────────────────────────────
const mountEl     = document.getElementById('recordCanvas');
const setupBtn    = document.getElementById('setupBtn');
const recordBtn   = document.getElementById('recordBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl    = document.getElementById('status');
const allInputs   = document.querySelectorAll('#controls input, #controls select');

let armedLabel = null;        // scene label ready to record (cleared on any control change)
let armedSlug  = null;        // filename slug for the armed scene
let lastTake   = null;        // { slug, url, blob }
let recorder   = null;
let recordingTimers = [];

// ─────────────────────────────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────────────────────────────
function setStatus(text, cls = '') {
  statusEl.textContent = text;
  statusEl.className   = cls;
}

function readControls() {
  const val = sel => document.querySelector(sel).value;
  return {
    mode:    document.querySelector('input[name="mode"]:checked').value,
    desk:    document.querySelector('input[name="desk"]:checked').value,
    overlay: document.querySelector('input[name="overlay"]:checked').value,
    spin:    document.querySelector('input[name="spin"]').checked,
    treat: {
      wall_panel_mode:    val('select[name="wall_panel_mode"]'),
      side_panel_mode:    val('select[name="side_panel_mode"]'),
      bass_trap_mode:     val('select[name="bass_trap_mode"]'),
      ceiling_panel_mode: val('select[name="ceiling_panel_mode"]'),
    },
  };
}

// Mutate recordState from the control panel. The engine reads recordState
// fresh on every rebuild, so this only needs to set fields — the rebuild is
// triggered by the setRoom* / focusIssue calls in the Setup handler.
function applyConfig(cfg) {
  const isStudio = cfg.mode === 'studio';
  recordState.room_type = cfg.mode;
  recordState.geometry  = { ...(isStudio ? STUDIO_GEO   : HOME_GEO) };
  recordState.setup     = { ...(isStudio ? STUDIO_SETUP : HOME_SETUP) };

  const f = recordState.environment.furniture;
  if (isStudio) {
    f.opt_display = true;  f.opt_keyboard = true;  f.opt_mic = false;
    f.opt_sofa = false; f.opt_area_rug = false; f.opt_coffee_table = false; f.opt_ottoman = false;
    f.desk_width_m = 1.6; f.desk_depth_m = 0.7; f.desk_style = cfg.desk;
  } else {
    f.opt_display = false; f.opt_keyboard = false; f.opt_mic = false;
    f.opt_sofa = true; f.opt_area_rug = false; f.opt_coffee_table = false; f.opt_ottoman = false;
  }

  recordState.environment.treatment = { ...cfg.treat };
}

function describe(cfg) {
  const base = cfg.mode === 'studio' ? `Studio · ${cfg.desk} desk` : 'Home';
  return `${base} · ${OVERLAY_LABELS[cfg.overlay]}`;
}

function slugify(cfg) {
  const parts = [cfg.mode];
  if (cfg.mode === 'studio') parts.push(cfg.desk);
  parts.push(cfg.overlay === 'none' ? 'clean' : cfg.overlay);
  const t = cfg.treat;
  const anyTreat = [t.wall_panel_mode, t.side_panel_mode, t.bass_trap_mode, t.ceiling_panel_mode]
    .some(v => v !== 'none');
  if (anyTreat) parts.push('treated');
  return parts.join('-');
}

function formatTimestamp(d) {
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}

function clearRecordingTimers() {
  for (const t of recordingTimers) {
    clearTimeout(t);
    clearInterval(t);
  }
  recordingTimers = [];
}

function checkRecorderSupport() {
  if (typeof MediaRecorder === 'undefined') {
    setStatus('Recording not supported in this browser', 'error');
    return false;
  }
  if (!MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
    setStatus('VP9 WebM not supported in this browser — use Chrome', 'error');
    return false;
  }
  return true;
}

function getCanvasEl() {
  return mountEl.querySelector('canvas');
}

// ─────────────────────────────────────────────────────────────────────
//  Setup scene — load room state, configure overlay, position camera
// ─────────────────────────────────────────────────────────────────────
setupBtn.addEventListener('click', () => {
  const cfg = readControls();
  setStatus('Setting up scene…');
  recordBtn.disabled = true;
  armedLabel = null;

  try {
    // Cleanup from any previous scene
    engine.stopAutoSpin();
    engine.resetCamera();

    // Mutate the room state the engine reads each rebuild
    applyConfig(cfg);

    // Sync the engine's geometry overrides + trigger rebuilds. These
    // setters also re-centre OrbitControls.target on the origin, which
    // matters because the orbit auto-rotates around that target.
    const g = recordState.geometry;
    engine.setRoomWidth(g.width_m);
    engine.setRoomLength(g.length_m);
    engine.setRoomHeight(g.height_m);

    // Tighter framing for the 1200×800 capture. zoom enlarges the rendered
    // image without dollying the camera, avoiding corner-clipping. Must run
    // AFTER setRoomWidth/Length/Height — each of those resets the target.
    const cam   = engine.getCamera();
    const ctrls = engine.getControls();
    cam.zoom = 1.5;
    cam.updateProjectionMatrix();
    ctrls.target.set(0, -0.4, 0);
    ctrls.update();

    // Bass Modes needs synthetic measurement data to render confirmed
    // (severity-coloured) modes; everything else uses behavioural sim only.
    engine.setMeasurementContext(cfg.overlay === 'bandwidth' ? BASS_MODES_CONTEXT : null);

    // focusIssue is the exclusive single-overlay path used by demo.html
    // (clears other overlays, sets focusedOverlay, rebuilds). null clears
    // all overlays for a clean scene. Score 8 = most dramatic intensity.
    engine.focusIssue(cfg.overlay === 'none' ? null : cfg.overlay, 8);

    if (cfg.spin) {
      // 360° / 60s = 6°/s at 1.0, so 2.0 → 12°/s → ~60° of swing across
      // the 5s usable capture window. Camera orbits around the target.
      engine.setSpinSpeed(2.0);
      engine.startAutoSpin();
    }

    // Wait one rAF for the rebuild's first frame to land before arming
    requestAnimationFrame(() => {
      armedLabel = describe(cfg);
      armedSlug  = slugify(cfg);
      recordBtn.disabled = false;
      setStatus(`Scene ready: ${armedLabel} — click Record 6s`, 'ready');
    });
  } catch (err) {
    console.error('[record] Setup failed:', err);
    setStatus(`Setup failed: ${err.message || err}`, 'error');
    armedLabel = null;
    recordBtn.disabled = true;
  }
});

// ─────────────────────────────────────────────────────────────────────
//  Record — 1s settle + 5s capture, then build a downloadable blob
// ─────────────────────────────────────────────────────────────────────
recordBtn.addEventListener('click', () => {
  if (!armedLabel) return;
  if (!checkRecorderSupport()) {
    recordBtn.disabled = true;
    return;
  }

  const canvas = getCanvasEl();
  if (!canvas || typeof canvas.captureStream !== 'function') {
    setStatus('Canvas does not support captureStream', 'error');
    return;
  }

  let stream;
  try {
    stream = canvas.captureStream(60);
  } catch (err) {
    setStatus(`captureStream failed: ${err.message || err}`, 'error');
    return;
  }
  if (!stream) {
    setStatus('captureStream returned null', 'error');
    return;
  }

  const chunks = [];
  try {
    recorder = new MediaRecorder(stream, {
      mimeType:           'video/webm;codecs=vp9',
      videoBitsPerSecond: 8_000_000,
    });
  } catch (err) {
    setStatus(`MediaRecorder construction failed: ${err.message || err}`, 'error');
    return;
  }

  recorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) chunks.push(e.data);
  };

  recorder.onerror = e => {
    clearRecordingTimers();
    mountEl.classList.remove('recording');
    recordBtn.disabled = false;
    setupBtn.disabled  = false;
    chunks.length = 0;
    setStatus(`Recording failed: ${e.error?.message || 'unknown error'}`, 'error');
  };

  recorder.onstop = () => {
    clearRecordingTimers();
    mountEl.classList.remove('recording');
    recordBtn.disabled = false;
    setupBtn.disabled  = false;

    if (chunks.length === 0) {
      setStatus('Recording produced no data', 'error');
      return;
    }

    // Free the previous take's blob URL so it doesn't leak
    if (lastTake?.url) URL.revokeObjectURL(lastTake.url);

    const blob = new Blob(chunks, { type: 'video/webm' });
    const url  = URL.createObjectURL(blob);
    lastTake = { slug: armedSlug, url, blob };
    downloadBtn.disabled = false;
    setStatus('Recording complete — ready to download', 'ready');
  };

  // Lock UI + canvas during capture
  recordBtn.disabled = true;
  setupBtn.disabled  = true;
  mountEl.classList.add('recording');
  setStatus('Recording: 6s left (settling…)', 'recording');

  // 1-second engine-settle buffer before the recorder starts
  recordingTimers.push(setTimeout(() => {
    try {
      recorder.start();
    } catch (err) {
      mountEl.classList.remove('recording');
      recordBtn.disabled = false;
      setupBtn.disabled  = false;
      setStatus(`Recorder start failed: ${err.message || err}`, 'error');
      return;
    }

    let remaining = 5;
    setStatus(`Recording: ${remaining}s left`, 'recording');

    const ticker = setInterval(() => {
      remaining--;
      if (remaining > 0) setStatus(`Recording: ${remaining}s left`, 'recording');
    }, 1000);
    recordingTimers.push(ticker);

    recordingTimers.push(setTimeout(() => {
      try { recorder.stop(); } catch (_) { /* onstop / onerror cleans up */ }
    }, 5000));
  }, 1000));
});

// ─────────────────────────────────────────────────────────────────────
//  Download — most recent take, filename includes config slug + timestamp
// ─────────────────────────────────────────────────────────────────────
downloadBtn.addEventListener('click', () => {
  if (!lastTake) return;
  const ts = formatTimestamp(new Date());
  const a  = document.createElement('a');
  a.href     = lastTake.url;
  a.download = `scene-${lastTake.slug}-${ts}.webm`;
  document.body.appendChild(a);
  a.click();
  a.remove();
});

// ─────────────────────────────────────────────────────────────────────
//  Any control change invalidates the armed state — force a fresh Setup
// ─────────────────────────────────────────────────────────────────────
allInputs.forEach(input => {
  input.addEventListener('change', () => {
    if (armedLabel !== null) {
      armedLabel = null;
      recordBtn.disabled = true;
      setStatus('Settings changed — click Setup scene');
    }
  });
});

// ─────────────────────────────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────────────────────────────
if (checkRecorderSupport()) {
  setStatus('Idle — configure a scene and click Setup');
} else {
  setupBtn.disabled  = true;
  recordBtn.disabled = true;
}
</script>

</body>
</html>
