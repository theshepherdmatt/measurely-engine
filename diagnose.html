    {

    }

    <!-- PWA / App-like behaviour -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Measurely">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b1220">

    <script>
    document.addEventListener('click', function(event) {
        // Don't override if another handler already called preventDefault (e.g. a modal)
        if (event.defaultPrevented) return;
        var target = event.target;
        // Walk up the DOM tree to find the 'a' tag (in case they clicked an icon inside the link)
        while (target && target.nodeName !== 'A') {
            target = target.parentNode;
        }

        if (target && target.href && target.getAttribute('target') !== '_blank') {
            // Check if the link is internal (points to your Pi's IP)
            if (target.href.indexOf(window.location.host) !== -1) {
                event.preventDefault();
                window.location.href = target.href;
            }
        }
    }, false);
    </script>

</head>

<!-- ═══════════════════════════════════════
     3D ROOM INIT
═══════════════════════════════════════ -->
<script type="module">
import { initRoom3D } from "./js/room3d.js";

window.__liveRoomState = null;

async function initDashboardRoom() {
    let roomState = null;
    try {
        const res = await fetch("/api/room/latest");
        if (res.ok) roomState = await res.json();
    } catch (e) {
        console.warn("[DiagnoseRoom] No saved room, skipping render");
    }

    if (!roomState) return;

    window.__liveRoomState = { ...roomState };
    window.__MEASURELY_ROOM__ = roomState;

    window.room3D = initRoom3D({
        mountId: "dashboardRoomCanvas",
        getRoomData: () => window.__liveRoomState,
        mode: "final"
    });

    room3D.setStage("furnishings");

    wireAnalysisCards();
}

document.addEventListener("DOMContentLoaded", initDashboardRoom);
</script>


<!-- ═══════════════════════════════════════
     DIAGNOSE CARD WIRING
═══════════════════════════════════════ -->
<script>
function wireAnalysisCards() {
    const cards = document.querySelectorAll('.analysis-card-trigger');
    if (!cards.length) return;

    function activateCard(card) {
        const overlay = card.dataset.overlay;
        if (!overlay || !window.room3D) return;

        cards.forEach(c => c.classList.remove('ra-metric-btn--active'));
        card.classList.add('ra-metric-btn--active');

        let score = 10;
        const scoreEl = card.querySelector('.score-value');
        if (scoreEl && !isNaN(parseFloat(scoreEl.textContent))) {
            score = parseFloat(scoreEl.textContent);
        }

        window.room3D.focusIssue(overlay, score);

        if (overlay === 'bandwidth') {
            window.room3D.highlight('wall_width');
        } else if (overlay === 'side_reflections') {
            window.room3D.highlight('wall_width');
        } else {
            window.room3D.highlight(null);
        }

        updateRoomInsightText(overlay, window.dashboard?.currentData);

        // Persist the active metric so Simulate can read it
        try {
            sessionStorage.setItem('diagnose_focus', JSON.stringify({
                id: overlay,
                score,
                std: window.room3D?.getFocus()?.std ?? null
            }));
        } catch (_) {}

        // Update the "Go to Simulate" link to carry the focus forward
        const goBtn = document.getElementById('goToSimulateBtn');
        if (goBtn) goBtn.href = `simulate.html`;
    }

    cards.forEach(card => {
        card.addEventListener('click', () => activateCard(card));
    });

    // Auto-select first card after data loads
    const poll = setInterval(() => {
        if (window.room3D && typeof window.room3D.focusIssue === 'function') {
            clearInterval(poll);
            setTimeout(() => {
                const first = document.querySelector('[data-overlay="sbir"]');
                if (first) activateCard(first);
            }, 400);
        }
    }, 100);
}
</script>


<!-- ═══════════════════════════════════════
     ROOM MODES BADGE (auto-populated)
═══════════════════════════════════════ -->
<script>
const modesPoll = setInterval(() => {
    const modes = window.dashboard?.currentData?.room_context?.modes;
    if (!modes) return;
    clearInterval(modesPoll);

    const badge = document.getElementById('raModesBadge');
    if (!badge) return;

    const grouped = {};
    modes.forEach(m => {
        if (!grouped[m.axis]) grouped[m.axis] = [];
        grouped[m.axis].push(m.freq_hz);
    });

    const parts = Object.entries(grouped).map(([axis, freqs]) => {
        const label = axis === 'width' ? 'Side walls' : axis === 'length' ? 'Front/back' : 'Floor/ceiling';
        const lowest = Math.round(Math.min(...freqs));
        return `<span class="ra-mode-chip ra-mode-${axis}">${label} <strong>${lowest} Hz</strong></span>`;
    });

    badge.innerHTML = parts.join('');
}, 200);
</script>
