    <script>
    document.addEventListener('click', function(event) {
        // Don't override if another handler already called preventDefault (e.g. a modal)
        if (event.defaultPrevented) return;
        var target = event.target;
        // Walk up the DOM tree to find the 'a' tag (in case they clicked an icon inside the link)
        while (target && target.nodeName !== 'A') {
            target = target.parentNode;
        }

        if (target && target.href && target.getAttribute('target') !== '_blank') {
            // Check if the link is internal (points to your Pi's IP)
            if (target.href.indexOf(window.location.host) !== -1) {
                event.preventDefault();
                window.location.href = target.href;
            }
        }
    }, false);
    </script>

<!-- ═══════════════════════════════════════
     3D ROOM INIT
═══════════════════════════════════════ -->
<script type="module">
import { initRoom3D } from "./js/room3d.js";

window.__liveRoomState = null;

function isStaticHosting() {
    const h = window.location.hostname;
    if (h === 'localhost' || h === '127.0.0.1') return false;
    if (/^192\.168\./.test(h) || /^10\./.test(h)) return false;
    if (h.endsWith('.local')) return false;
    return true;
}

async function initDashboardRoom() {
    let roomState = null;

    // 1. Try localStorage first (works offline / GitHub Pages / static hosting)
    try {
        const ls = localStorage.getItem('measurely_room');
        if (ls) roomState = JSON.parse(ls);
    } catch (_) {}

    // 2. Try server only when running against a Pi backend
    if (!isStaticHosting()) {
        try {
            const res = await fetch("/api/room/latest");
            if (res.ok) {
                const apiData = await res.json();
                if (apiData && Object.keys(apiData).length > 0) {
                    roomState = apiData;
                    localStorage.setItem('measurely_room', JSON.stringify(roomState));
                }
            }
        } catch (_) {
            console.log("[DiagnoseRoom] Server not reachable — using localStorage");
        }
    }

    if (!roomState) {
        // User is authenticated but has no room record — seed a sensible default
        // so the 3D scene initialises rather than silently showing a blank loader.
        const isAuth = window._pb?.()?.authStore?.isValid === true;
        if (isAuth) {
            roomState = {
                room_type: 'home',
                geometry: { width_m: 4.2, length_m: 5.5, height_m: 2.6,
                            ceiling_type: 'flat', ceiling_height_secondary_m: 2.0,
                            ceiling_slant_direction: 'left_to_right', ceiling_gable_axis: 'depth' },
                setup: { speaker_type: 'standmount', spk_spacing_m: 2.0, spk_front_m: 0.5,
                         tweeter_height_m: 0.95, toe_in_deg: 10, listener_front_m: 2.8,
                         listener_offset_m: 0, subwoofer: false },
                environment: {
                    floor_material: 'hard',
                    furniture:  { opt_area_rug: false, opt_sofa: false, opt_coffee_table: false },
                    treatment:  { wall_panel_mode: 'none', side_panel_mode: 'none',
                                  bass_trap_mode: 'none', ceiling_panel_mode: 'none' }
                }
            };
            try { localStorage.setItem('measurely_room', JSON.stringify(roomState)); } catch (_) {}
            window.MeasurelySync?.pushRoom?.(); // initialise cloud record silently
        } else {
            // Not logged in and no local room — hide the loader and bail
            const loader = document.getElementById('room3dLoader');
            if (loader) loader.style.display = 'none';
            return;
        }
    }

    window.__liveRoomState = { ...roomState };
    window.__MEASURELY_ROOM__ = roomState;

    window.room3D = initRoom3D({
        mountId: "dashboardRoomCanvas",
        getRoomData: () => window.__liveRoomState,
        mode: "locked"
    });

    room3D.setStage("furnishings");

    // Dismiss the 3D loading overlay after the first rendered frame
    requestAnimationFrame(() => requestAnimationFrame(() => {
        const loader = document.getElementById('room3dLoader');
        if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }
    }));
    // Fallback: if loader is still visible after 8s, show a "taking longer" message
    setTimeout(() => {
        const loader = document.getElementById('room3dLoader');
        const txt = loader?.querySelector('.room3d-loader-text');
        if (txt && loader && loader.style.display !== 'none' && !loader.classList.contains('hidden')) {
            txt.textContent = 'Taking longer than expected…';
        }
    }, 8000);

    wireAnalysisCards();
}

document.addEventListener("DOMContentLoaded", initDashboardRoom);
</script>


<!-- ═══════════════════════════════════════
     DIAGNOSE CARD WIRING
═══════════════════════════════════════ -->
<script>
function wireAnalysisCards() {
    const cards = document.querySelectorAll('.analysis-card-trigger');
    if (!cards.length) return;

    function activateCard(card) {
        const overlay = card.dataset.overlay;
        if (!overlay || !window.room3D) return;

        cards.forEach(c => c.classList.remove('ra-metric-btn--active'));
        card.classList.add('ra-metric-btn--active');

        let score = 10;
        const scoreEl = card.querySelector('.score-value');
        if (scoreEl && !isNaN(parseFloat(scoreEl.textContent))) {
            score = parseFloat(scoreEl.textContent);
        }

        window.room3D.focusIssue(overlay, score);

        if (overlay === 'bandwidth') {
            window.room3D.highlight('wall_width');
        } else if (overlay === 'side_reflections') {
            window.room3D.highlight('wall_width');
        } else {
            window.room3D.highlight(null);
        }

        updateRoomInsightText(overlay, window.dashboard?.currentData);

        // Persist the active metric so Simulate can read it
        try {
            sessionStorage.setItem('diagnose_focus', JSON.stringify({
                id: overlay,
                score,
                std: window.room3D?.getFocus()?.std ?? null
            }));
        } catch (_) {}

        // Update the "Go to Simulate" link to carry the focus forward
        const goBtn = document.getElementById('goToSimulateBtn');
        if (goBtn) goBtn.href = `simulate.html`;
    }

    cards.forEach(card => {
        card.addEventListener('click', () => activateCard(card));
    });

    // Auto-select first card after data loads
    const poll = setInterval(() => {
        if (window.room3D && typeof window.room3D.focusIssue === 'function') {
            clearInterval(poll);
            setTimeout(() => {
                const first = document.querySelector('[data-overlay="sbir"]');
                if (first) activateCard(first);
            }, 400);
        }
    }, 100);
}
</script>


<!-- ═══════════════════════════════════════
     ROOM MODES BADGE (auto-populated)
═══════════════════════════════════════ -->
<script>
const modesPoll = setInterval(() => {
    const modes = window.dashboard?.currentData?.room_context?.modes;
    if (!modes) return;
    clearInterval(modesPoll);

    const badge = document.getElementById('raModesBadge');
    if (!badge) return;

    const grouped = {};
    modes.forEach(m => {
        if (!grouped[m.axis]) grouped[m.axis] = [];
        grouped[m.axis].push(m.freq_hz);
    });

    const parts = Object.entries(grouped).map(([axis, freqs]) => {
        const label = axis === 'width' ? 'Side walls' : axis === 'length' ? 'Front/back' : 'Floor/ceiling';
        const lowest = Math.round(Math.min(...freqs));
        return `<span class="ra-mode-chip ra-mode-${axis}" aria-label="${label} dominant mode at ${lowest} Hz">${label} <strong aria-hidden="true">${lowest} Hz</strong></span>`;
    });

    badge.innerHTML = parts.join('');
}, 200);
</script>
